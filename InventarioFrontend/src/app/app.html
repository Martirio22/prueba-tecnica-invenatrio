<!-- app.html -->
<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <div class="brand">
        <i class="fa-solid fa-boxes-stacked brand-icon"></i>
        <span class="brand-name">InvStock</span>
      </div>
      <button class="collapse-btn" (click)="toggleSidebar()">
        <i class="fa-solid" [class.fa-chevron-left]="!sidebarCollapsed" [class.fa-chevron-right]="sidebarCollapsed"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul>
        <li>
          <a routerLink="/productos" routerLinkActive="active">
            <i class="fa-solid fa-box"></i>
            <span class="nav-label">Productos</span>
          </a>
        </li>
        <li>
          <a routerLink="/transacciones" routerLinkActive="active">
            <i class="fa-solid fa-right-left"></i>
            <span class="nav-label">Transacciones</span>
          </a>
        </li>
        <li>
          <a routerLink="/categorias" routerLinkActive="active">
            <i class="fa-solid fa-tags"></i>
            <span class="nav-label">Categorías</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="version-tag">
        <i class="fa-solid fa-circle-info"></i>
        <span class="nav-label">v1.0.0</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="page-title">{{ pageTitle }}</h2>
      </div>
      <div class="topbar-right">
        <div class="user-chip">
          <i class="fa-solid fa-user-circle"></i>
          <span>Admin</span>
        </div>
      </div>
    </header>

    <!-- Alert global -->
    <!-- <app-alert></app-alert> -->

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
